name: Deploy n8n API Key

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      HOST: "187.124.22.137"
      PORT: "22"
      USER_NAME: "root"

    steps:
      - name: Deploy
        env:
          SSH_PRIVATE_KEY: "${{ secrets.SERVER_SSH_KEY }}"
          N8N_API_KEY: "${{ secrets.N8N_API_KEY }}"
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "$PORT" "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          do_ssh() {
            ssh -i ~/.ssh/id_deploy -p "$PORT" -o StrictHostKeyChecking=accept-new "${USER_NAME}@${HOST}" "$@"
          }

          do_ssh "mkdir -p /etc/secrets"
          printf '%s\n' "$N8N_API_KEY" | do_ssh "cat > /etc/secrets/n8n_api_key"
          do_ssh "chmod 600 /etc/secrets/n8n_api_key && chown root:root /etc/secrets/n8n_api_key"
          do_ssh "cd /docker/n8n && docker compose down && docker compose up -d"

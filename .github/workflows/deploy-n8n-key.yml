name: Deploy n8n API key to server
on:
workflow_dispatch: {}
jobs:
deploy:
runs-on: ubuntu-latest
steps:
- name: Write N8N key on server and restart n8n
uses: appleboy/ssh-action@v0.1.7
with:
host: "${{ secrets.SERVER_HOST }}"
username: "${{ secrets.SERVER_USER }}"
key: "${{ secrets.SERVER_SSH_KEY }}"
port: "${{ secrets.SERVER_SSH_PORT }}"
script: |
echo "${{ secrets.N8N_API_KEY }}" | sudo tee /etc/secrets/n8n_api_key > /dev/null
sudo chmod 600 /etc/secrets/n8n_api_key
sudo chown root:root /etc/secrets/n8n_api_key
cd /docker/n8n  true
docker compose down  true
docker compose up -d

name: Deploy n8n API key to server
on:
workflow_dispatch: {}
jobs:
deploy:
runs-on: ubuntu-latest
steps:
- name: Prepare SSH key
run: |
mkdir -p ~/.ssh
echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_n8n_deploy
chmod 600 ~/.ssh/id_n8n_deploy
- name: Write N8N key on server and restart n8n
env:
SERVER_HOST: ${{ secrets.SERVER_HOST }}
SERVER_USER: ${{ secrets.SERVER_USER }}
SERVER_SSH_PORT: ${{ secrets.SERVER_SSH_PORT }}
run: |
ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_n8n_deploy -p "${SERVER_SSH_PORT}" "${SERVER_USER}@${SERVER_HOST}" 
"echo '${{ secrets.N8N_API_KEY }}' | sudo tee /etc/secrets/n8n_api_key > /dev/null && 
sudo chmod 600 /etc/secrets/n8n_api_key && 
sudo chown root:root /etc/secrets/n8n_api_key && 
cd /docker/n8n  true && 
docker compose down  true && 
docker compose up -d"
